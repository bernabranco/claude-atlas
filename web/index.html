<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>claude-atlas</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <style>
      :root {
        --bg: #0b0e13;
        --panel: #141821;
        --border: #2a3040;
        --text: #e5e7eb;
        --muted: #8a93a4;
        --accent: #6ea8fe;
        --agent: #6ea8fe;
        --command: #f7b267;
        --tool: #9eddba;
        --mcp: #c084fc;
        --error: #ef4444;
        --warning: #eab308;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 system-ui, -apple-system, sans-serif;
      }
      #layout { display: grid; grid-template-columns: 1fr 360px; height: 100vh; }
      #cy { background: var(--bg); }
      #side {
        background: var(--panel);
        border-left: 1px solid var(--border);
        overflow-y: auto;
        padding: 16px 20px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      header .counts { color: var(--muted); font-size: 12px; }
      header .legend { display: flex; gap: 12px; font-size: 12px; }
      header .legend span { display: flex; align-items: center; gap: 6px; }
      header .legend i {
        width: 10px; height: 10px; border-radius: 50%; display: inline-block;
      }
      #side h2 { font-size: 13px; color: var(--muted); font-weight: 500; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.04em; }
      #side h2:first-child { margin-top: 0; }
      #side .title { font-size: 18px; font-weight: 600; margin: 0 0 4px; word-break: break-word; }
      #side .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
      #side .tag {
        display: inline-block; padding: 2px 8px; border-radius: 10px;
        font-size: 11px; border: 1px solid var(--border); margin-right: 4px; margin-bottom: 4px;
        color: var(--text);
      }
      #side .desc { white-space: pre-wrap; color: var(--text); }
      #side .list { margin: 0; padding: 0; list-style: none; }
      #side .list li { padding: 4px 0; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); }
      #side .list li:hover { color: var(--accent); }
      #side .empty { color: var(--muted); font-style: italic; font-size: 12px; }
      .lint-error { color: var(--error); }
      .lint-warning { color: var(--warning); }
      .lint-info { color: var(--muted); }
      .lint-row { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
      .lint-row .code { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="layout">
      <div style="display:flex; flex-direction:column;">
        <header>
          <h1>claude-atlas</h1>
          <div class="legend">
            <span><i style="background:var(--agent)"></i>agent</span>
            <span><i style="background:var(--command)"></i>command</span>
            <span><i style="background:var(--tool)"></i>tool</span>
            <span><i style="background:var(--mcp)"></i>mcp</span>
          </div>
          <div class="counts" id="counts">loading…</div>
        </header>
        <div id="cy" style="flex:1;"></div>
      </div>
      <div id="side">
        <div class="sub">Click a node for details.</div>
        <h2>Lint</h2>
        <div id="lint" class="empty">loading…</div>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
