<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>claude-atlas</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              bg: "#000000",
              "bg-2": "#0d1017",
              panel: "#000000",
              "panel-2": "#171b25",
              border: "#22283a",
              "border-2": "#2e3750",
              fg: "#e7e9ee",
              "fg-2": "#a8aebd",
              muted: "#6b7487",
              agent: "#7aa7ff",
              command: "#f4a261",
              tool: "#84d9a8",
              mcp: "#c08cf8",
              accent: "#7aa7ff",
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
              mono: ['ui-monospace', 'SFMono-Regular', 'monospace'],
            },
            boxShadow: {
              glow: "0 0 24px -2px rgb(122 167 255 / 0.35)",
              soft: "0 1px 0 0 rgb(255 255 255 / 0.04) inset, 0 8px 24px -12px rgb(0 0 0 / 0.5)",
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
      html, body { background: #000000; color: #e7e9ee; font-feature-settings: "cv11", "ss03"; -webkit-font-smoothing: antialiased; }
      #cy {
        background-color: #000000;
        background-image:
          radial-gradient(circle at 25% 15%, rgba(122,167,255,0.06), transparent 45%),
          radial-gradient(circle at 80% 85%, rgba(192,140,248,0.05), transparent 50%),
          radial-gradient(circle, rgba(70, 80, 110, 0.14) 1px, transparent 1.2px);
        background-size: auto, auto, 22px 22px;
      }
      .chip.off { opacity: 0.35; }
      .chip.off .swatch-ring { border-color: transparent; }
      .mode-btn.active { background: #1a2136; color: #e7e9ee; }
      .fade-in { animation: fadeIn 0.25s ease-out both; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* Sidebar scroll */
      #side::-webkit-scrollbar { width: 8px; }
      #side::-webkit-scrollbar-track { background: transparent; }
      #side::-webkit-scrollbar-thumb { background: #22283a; border-radius: 4px; }
      #side::-webkit-scrollbar-thumb:hover { background: #2e3750; }

      /* Loading overlay */
      #loading {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #000000;
        z-index: 10;
        transition: opacity 0.7s ease-out;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      .loading-pulse {
        width: 8px; height: 8px; border-radius: 50%;
        background: #7aa7ff;
        box-shadow: 0 0 14px #7aa7ff;
        animation: loadingPulse 1.2s ease-in-out infinite;
      }
      @keyframes loadingPulse {
        0%, 100% { opacity: 0.25; transform: scale(0.9); }
        50%      { opacity: 1;    transform: scale(1.15); }
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden font-sans">
    <div class="grid h-screen" style="grid-template-columns:1fr 400px; grid-template-rows:52px 1fr; grid-template-areas:'top top' 'cy side';">

      <header class="flex items-center gap-4 px-4 bg-panel border-b border-border" style="grid-area:top;">
        <div class="flex items-baseline gap-2">
          <h1 class="text-[13px] font-semibold tracking-tight">claude-atlas</h1>
          <span id="counts" class="text-[11.5px] text-fg-2">loading…</span>
        </div>

        <div class="relative flex-1 max-w-sm">
          <input id="search"
            placeholder="Search nodes…   press /"
            class="w-full bg-bg-2 border border-border hover:border-border-2 focus:border-accent/60 focus:outline-none focus:ring-2 focus:ring-accent/20 text-fg placeholder:text-muted text-[12.5px] rounded-md px-3 py-1.5 transition-colors" />
        </div>

        <div id="filters" class="flex gap-1.5">
          <button data-type="agent" class="chip inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] rounded-full border border-border hover:border-border-2 bg-bg-2 text-fg-2 hover:text-fg transition-colors">
            <span class="swatch-ring w-2 h-2 rounded-full bg-agent border border-agent/0"></span>agents
          </button>
          <button data-type="command" class="chip inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] rounded-full border border-border hover:border-border-2 bg-bg-2 text-fg-2 hover:text-fg transition-colors">
            <span class="swatch-ring w-2 h-2 rounded-full bg-command"></span>commands
          </button>
          <button data-type="tool" class="chip inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] rounded-full border border-border hover:border-border-2 bg-bg-2 text-fg-2 hover:text-fg transition-colors">
            <span class="swatch-ring w-2 h-2 rounded-full bg-tool"></span>tools
          </button>
          <button data-type="mcp" class="chip inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] rounded-full border border-border hover:border-border-2 bg-bg-2 text-fg-2 hover:text-fg transition-colors">
            <span class="swatch-ring w-2 h-2 rounded-full bg-mcp"></span>mcp
          </button>
        </div>

        <div class="flex gap-1 ml-auto">
          <button id="btn-fit" class="px-2.5 py-1 text-[11.5px] rounded-md border border-border bg-bg-2 text-fg-2 hover:text-fg hover:border-border-2 transition-colors">Fit</button>
          <div class="inline-flex rounded-md border border-border overflow-hidden text-[11.5px]">
            <button data-mode="flow"   class="mode-btn px-2.5 py-1 bg-bg-2 text-fg-2 hover:text-fg transition-colors">Flow</button>
            <button data-mode="types"  class="mode-btn px-2.5 py-1 bg-bg-2 text-fg hover:text-fg transition-colors border-l border-border">Types</button>
            <button data-mode="groups" class="mode-btn px-2.5 py-1 bg-bg-2 text-fg-2 hover:text-fg transition-colors border-l border-border">Groups</button>
          </div>
        </div>
      </header>

      <div style="grid-area:cy; position:relative;">
        <div id="cy" style="position:absolute; inset:0;"></div>

        <div id="legend" class="absolute bottom-4 left-4 bg-panel/85 backdrop-blur-sm border border-border rounded-lg px-3 py-2.5 text-[11px] space-y-2 select-none pointer-events-none">
          <div>
            <div class="text-[9.5px] uppercase tracking-[0.08em] text-muted font-semibold mb-1.5">Edges</div>
            <div class="space-y-1">
              <div class="flex items-center gap-2">
                <svg width="28" height="6"><line x1="2" y1="3" x2="26" y2="3" stroke="#5d81c4" stroke-width="1.5"/></svg>
                <span class="text-fg-2">invokes</span>
              </div>
              <div class="flex items-center gap-2">
                <svg width="28" height="6"><line x1="2" y1="3" x2="26" y2="3" stroke="#5ea881" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
                <span class="text-fg-2">grant</span>
              </div>
            </div>
          </div>
        </div>

        <div id="loading">
          <div class="flex items-center gap-3 text-fg-2 text-[12.5px] tracking-wide">
            <span class="loading-pulse"></span>
            <span>Analyzing <span class="font-mono text-fg">.claude/</span>…</span>
          </div>
        </div>
      </div>

      <aside id="side" class="overflow-y-auto bg-panel border-l border-border px-5 pt-5 pb-10" style="grid-area:side;">

        <!-- empty state -->
        <div id="empty-state" class="text-muted text-[12.5px] text-center py-14">
          Click a node to see details.<br>
          <span class="inline-block mt-2">
            Press
            <kbd class="inline-block px-1.5 py-0.5 rounded border border-border bg-bg-2 font-mono text-[11px]">/</kbd>
            to focus search,
            <kbd class="inline-block px-1.5 py-0.5 rounded border border-border bg-bg-2 font-mono text-[11px]">Esc</kbd>
            to clear.
          </span>
        </div>

        <div id="details" class="hidden fade-in"></div>

        <div id="lint-section" class="mt-6 hidden">
          <h2 class="flex items-center gap-2 text-[10.5px] uppercase tracking-[0.08em] text-muted font-semibold mb-2">
            <span>Lint</span>
            <span id="lint-count" class="px-1.5 py-0.5 rounded-full bg-bg-2 border border-border text-fg-2 text-[10px] font-mono normal-case tracking-normal"></span>
          </h2>
          <div id="lint" class="space-y-1.5"></div>
        </div>
      </aside>

    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
