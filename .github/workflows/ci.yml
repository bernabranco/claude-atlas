name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Syntax check JS
        run: find bin lib web -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Scan fixture
        run: node bin/cli.js scan test/fixtures/sample

      - name: Lint fixture
        run: node bin/cli.js lint test/fixtures/sample

      - name: Duplicates fixture
        run: node bin/cli.js duplicates test/fixtures/sample

  extension:
    name: extension package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps (web assets)
        run: npm ci

      - name: Install extension deps
        run: npm ci
        working-directory: extension

      - name: Compile + package
        run: npm run package
        working-directory: extension

      - name: Upload vsix
        uses: actions/upload-artifact@v4
        with:
          name: claude-atlas-vsix
          path: extension/*.vsix
